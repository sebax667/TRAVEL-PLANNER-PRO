<!DOCTYPE html>
<html lang="es" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Travel Planner Pro</title>
    <link rel="stylesheet" href="css/styles.css?v=2">
</head>
<body>
    <!-- Header / Navbar -->
    <header>
        <h1>Travel Planner Pro</h1>
        <button id="theme-toggle">🌓 Cambiar Tema</button>
    </header>

    <!-- Módulo 1: Registro de Viajero (Se ocultará si ya está registrado) -->
    <section id="registration-section">
        <h2>Bienvenido, Viajero</h2>
        <p>Por favor, ingresa tus datos para personalizar tu experiencia.</p>
        <form id="registration-form">
            <input type="text" id="user-name" placeholder="Tu Nombre" required>
            <input type="email" id="user-email" placeholder="Tu Correo" required>
            <input type="text" id="user-country" placeholder="Tu País de Origen" required>
            <button type="submit">Comenzar Aventura</button>
        </form>
    </section>

    <!-- Contenedor Principal del Dashboard (Oculto inicialmente) -->
   <!-- Contenedor Principal del Dashboard -->
    <main id="dashboard-section" class="hidden">
        
        <!-- Cabecera del Dashboard y Módulo 11: Estadísticas -->
        <header class="dashboard-header">
            <h2 id="welcome-message"></h2>
            <div class="stats-container">
                <div class="stat-card">
                    <h3>Países Consultados</h3>
                    <p id="stat-history">0</p>
                </div>
                <div class="stat-card">
                    <h3>Países Favoritos</h3>
                    <p id="stat-fav-countries">0</p>
                </div>
                <div class="stat-card">
                    <h3>Atracciones Favoritas</h3>
                    <p id="stat-fav-attractions">0</p>
                </div>
            </div>
        </header>

        <!-- Módulo 2: Buscador -->
        <section class="search-section">
            <form id="search-form">
                <input type="text" id="search-input" placeholder="Buscar país en inglés (ej. Colombia, Japan, France...)" required>
                <button type="submit">Buscar Destino</button>
            </form>
        </section>

        <!-- Loader de Carga (Oculto por defecto) -->
        <div id="loader" class="hidden">
            <div class="spinner"></div>
            <p>Consultando satélites y bases de datos...</p>
        </div>

       <!-- Contenedor donde inyectaremos los resultados de las APIs -->
        <section id="results-section" class="hidden">
            <div id="country-info"></div>
            
            <!-- NUEVO: Wrapper para Clima y Moneda -->
            <div class="grid-2-cols">
                <div id="weather-info"></div>
                <div id="currency-info"></div>
            </div>
            
            <div id="tourism-info"></div>
        </section>
        
    </main>

    <script type="module" src="js/app.js?v=2"></script>
</body>
</html>
